# Copy to secret.yaml and fill in real values. Do not commit secret.yaml.
# kubectl create secret generic file-service-secret --from-literal=REDIS_PASSWORD=... --from-literal=MINIO_ACCESS_KEY=... --from-literal=MINIO_SECRET_KEY=...
# Or apply this (base64-encoded values) after replacing placeholders.
apiVersion: v1
kind: Secret
metadata:
  name: file-service-secret
type: Opaque
stringData:
  REDIS_PASSWORD: ""          # set if Redis has a password
  MINIO_ACCESS_KEY: ""         # required
  MINIO_SECRET_KEY: ""         # required
